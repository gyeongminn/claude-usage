<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <title>Claude Usage</title>
    <link rel="stylesheet" href="tokens.css" />
    <link rel="stylesheet" href="dashboard.css" />
  </head>
  <body>
    <!-- 업데이트 알림 배너(FEAT-010): main이 새 버전 감지 시 표시. "받기"→릴리즈 페이지(외부 브라우저). 평소 숨김. -->
    <div id="update-banner" class="update-banner" hidden>
      <span id="update-text"></span>
      <button id="update-get" class="btn-update" type="button" data-i18n="update_get">받기</button>
    </div>

    <!-- 상단 툴바: 좌측=메인/상세 탭, 우측=아이콘 버튼(같은 row, 사용자 요청). -->
    <header class="toolbar">
      <nav class="tabs">
        <button id="tab-main" class="tab active" type="button" data-i18n="tab_main">메인</button>
        <button id="tab-detail" class="tab" type="button" data-i18n="tab_detail">상세</button>
      </nav>
      <div class="toolbar-actions">
      <button id="btn-zoom-out" class="icon-btn" type="button" data-i18n-title="dash_zoom_out" aria-label="Zoom out">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="7" /><path d="M21 21l-4.3-4.3M8 11h6" />
        </svg>
      </button>
      <button id="btn-zoom-in" class="icon-btn" type="button" data-i18n-title="dash_zoom_in" aria-label="Zoom in">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="7" /><path d="M21 21l-4.3-4.3M11 8v6M8 11h6" />
        </svg>
      </button>
      <button id="btn-theme" class="icon-btn" type="button" data-i18n-title="dash_theme" aria-label="Theme">
        <!-- 라이트일 때 moon(→다크로), 다크일 때 sun(→라이트로). CSS가 data-theme로 토글. -->
        <svg class="icon-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
        </svg>
        <svg class="icon-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="4" /><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4" />
        </svg>
      </button>
      <button id="btn-refresh" class="icon-btn" type="button" data-i18n-title="dash_refresh" aria-label="Refresh">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 12a9 9 0 0 1 15-6.7L21 8" /><path d="M21 3v5h-5" />
          <path d="M21 12a9 9 0 0 1-15 6.7L3 16" /><path d="M3 21v-5h5" />
        </svg>
      </button>
      <button id="btn-settings" class="icon-btn" type="button" data-i18n-title="set_title" aria-label="Settings">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="3" />
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
        </svg>
      </button>
      </div>
    </header>

    <!-- 메인 탭 — 히어로(5h·7d 실제 소진률 좌우분할) / 추세 / 오늘 -->
    <main id="view-main" class="grid">
      <section class="card hero" aria-label="usage">
        <div class="hero-split">
          <div class="usage-col">
            <div class="card-label" data-i18n="usage_5h">5시간 한도</div>
            <div class="usage-pct" id="u5h-pct">—</div>
            <div class="gauge-track"><div class="gauge-fill" id="u5h-fill"></div></div>
            <div class="gauge-meta"><span id="u5h-reset"></span><span id="u5h-eta"></span></div>
            <div class="usage-burn"><span id="burn-cost">—</span><span class="rate-unit" data-i18n="dash_per_hour">/h</span> · <span id="burn-tok">—</span><span class="rate-unit" data-i18n="dash_tok_per_hour">tok/h</span></div>
          </div>
          <div class="usage-col">
            <div class="card-label" data-i18n="usage_weekly">주간 한도</div>
            <div class="usage-pct" id="u7d-pct">—</div>
            <div class="gauge-track"><div class="gauge-fill" id="u7d-fill"></div></div>
            <div class="gauge-meta"><span id="u7d-reset"></span><span id="u7d-eta"></span></div>
          </div>
        </div>
        <div class="usage-reauth" id="usage-reauth" data-i18n="usage_reauth" hidden>Sign in to Claude Code to refresh usage</div>
      </section>

      <section class="card trend" aria-label="trend">
        <div class="card-head">
          <div class="card-label"><span class="live-dot"></span><span data-i18n="dash_trend">일자별 추세</span></div>
          <div class="toggle">
            <button id="t-cost" class="toggle-btn active" data-i18n="dash_cost">비용</button>
            <button id="t-tok" class="toggle-btn" data-i18n="dash_tokens">토큰</button>
          </div>
        </div>
        <div id="trend-chart" class="chart-slot"></div>
      </section>

      <section class="card today" aria-label="today">
        <div class="card-label" data-i18n="dash_today">오늘</div>
        <div class="kpi-row">
          <div class="kpi">
            <div class="kpi-val cost-stack"><span class="cost-usd" id="today-cost-usd">$0.00</span><span class="cost-krw" id="today-cost-krw"></span></div>
            <div class="kpi-cap" data-i18n="dash_cost">비용</div>
          </div>
          <div class="kpi"><div class="kpi-val" id="today-tok">0</div><div class="kpi-cap" data-i18n="dash_tokens">토큰</div></div>
        </div>
        <div class="last7">
          <span class="last7-label" data-i18n="dash_last7">최근 7일</span>
          <span class="last7-vals"><span id="last7-cost">$0.00</span> · <span id="last7-tok">0</span></span>
        </div>
      </section>

      <section class="card weekly" aria-label="weekly">
        <div class="card-label" data-i18n="dash_weekly5">최근 5주</div>
        <div id="week-list" class="week-list"></div>
      </section>
    </main>

    <!-- 상세 탭 — 모델별 비중 / 프로젝트 Top 5 -->
    <main id="view-detail" class="grid-detail" hidden>
      <section class="card" aria-label="models">
        <div class="card-label" data-i18n="model_share">모델 사용 비중</div>
        <div id="model-donut" class="donut-slot"></div>
        <div id="model-legend" class="model-legend"></div>
      </section>
      <section class="card" aria-label="token composition">
        <div class="card-label" data-i18n="detail_token_comp">토큰 구성</div>
        <div class="tok-comp">
          <div class="tok-row"><span class="tok-name" data-i18n="tok_input">입력</span><div class="tok-bar"><div class="tok-fill" id="tc-input-fill"></div></div><span class="tok-val" id="tc-input">0</span></div>
          <div class="tok-row"><span class="tok-name" data-i18n="tok_output">출력</span><div class="tok-bar"><div class="tok-fill" id="tc-output-fill"></div></div><span class="tok-val" id="tc-output">0</span></div>
          <div class="tok-row"><span class="tok-name" data-i18n="tok_cache_create">캐시 생성</span><div class="tok-bar"><div class="tok-fill" id="tc-create-fill"></div></div><span class="tok-val" id="tc-create">0</span></div>
          <div class="tok-row"><span class="tok-name" data-i18n="tok_cache_read">캐시 읽기</span><div class="tok-bar"><div class="tok-fill" id="tc-read-fill"></div></div><span class="tok-val" id="tc-read">0</span></div>
        </div>
        <div class="cache-eff"><span data-i18n="cache_efficiency">캐시 효율</span><span class="cache-eff-val" id="cache-eff">0%</span></div>
      </section>
      <section class="card" aria-label="projects">
        <div class="card-label" data-i18n="dash_projects">프로젝트 Top 5</div>
        <!-- AUDIT-010: 가짜 샘플 제거(§2). ccusage v20 프로젝트 축 미노출(OPEN[08]) → 빈상태. -->
        <div id="project-empty" class="empty-state" data-i18n="dash_projects_empty">프로젝트별 데이터는 아직 지원되지 않습니다</div>
      </section>
    </main>

    <!-- 설정 화면(UI-040): 전체 설정 편집 + 즉시 반영. 토스풍 모달(흰 카드·소프트 그림자). -->
    <div id="settings-overlay" class="modal-overlay" hidden>
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="set-title">
        <div class="modal-head">
          <span id="set-title" data-i18n="set_title">설정</span>
          <button id="set-close" class="icon-btn" type="button" aria-label="Close">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12" /></svg>
          </button>
        </div>
        <div class="modal-body">
          <label class="set-row"><span data-i18n="set_language">언어</span>
            <select id="set-locale"></select></label>
          <label class="set-row"><span data-i18n="dash_theme">테마</span>
            <select id="set-theme">
              <option value="light" data-i18n="set_light">라이트</option>
              <option value="dark" data-i18n="set_dark">다크</option>
            </select></label>
          <label class="set-row"><span data-i18n="set_timezone">표시 타임존</span>
            <input id="set-timezone" type="text" /></label>
          <label class="set-row"><span data-i18n="set_krw">환율 (₩/$)</span>
            <input id="set-krw" type="number" min="1" step="1" /></label>
          <label class="set-row"><span data-i18n="set_token_limit">플랜 토큰 한도</span>
            <input id="set-token-limit" type="number" min="0" step="1000000" /></label>
          <label class="set-row"><span data-i18n="set_reports_dir">보고서 폴더</span>
            <input id="set-reports-dir" type="text" /></label>
          <label class="set-row"><span data-i18n="set_scale">UI 배율</span>
            <input id="set-scale" type="number" min="0.8" max="1.5" step="0.1" /></label>
          <label class="set-row"><span data-i18n="set_autolaunch">로그인 시 자동 실행</span>
            <input id="set-autolaunch" type="checkbox" /></label>
          <label class="set-row"><span data-i18n="set_check_updates">업데이트 확인</span>
            <input id="set-check-updates" type="checkbox" /></label>
          <label class="set-row"><span data-i18n="set_accurate">실제 사용 한도</span>
            <input id="set-accurate" type="checkbox" /></label>
        </div>
        <div class="modal-foot">
          <button id="set-cancel" class="btn-secondary" type="button" data-i18n="set_cancel">취소</button>
          <button id="set-save" class="btn-primary" type="button" data-i18n="set_save">저장</button>
        </div>
      </div>
    </div>

    <script src="../../node_modules/echarts/dist/echarts.min.js"></script>
    <script src="echartsTheme.js"></script>
    <script src="trendChart.js"></script>
    <script src="modelDonut.js"></script>
    <script src="burnGauge.js"></script>
    <script src="format.js"></script>
    <script src="chartResize.js"></script>
    <script>
      // i18n(OPEN[07] 해소): preload가 노출한 t/locale. 정적 라벨(data-i18n) 일괄 적용 + 동적 문자열은 t() 보간.
      // UI-040: t는 로케일 변경 시 재바인딩되므로 let. applyI18n()으로 재번역 재사용.
      let t = (window.usage && window.usage.t) || ((k) => k);
      // AUDIT-030: 숫자·통화 포맷을 UI 로케일 Intl로(§10, de/fr/it/vi 자리구분 다름). 첫 포맷 전 1회.
      if (window.usage && window.usage.locale && window.Fmt) window.Fmt.setLocale(window.usage.locale);
      function applyI18n() {
        document.querySelectorAll('[data-i18n]').forEach((e) => {
          const v = t(e.getAttribute('data-i18n'));
          if (v) e.textContent = v;
        });
        // 아이콘 버튼 등은 텍스트 대신 title/aria-label만 번역(UI-010 툴바).
        document.querySelectorAll('[data-i18n-title]').forEach((e) => {
          const v = t(e.getAttribute('data-i18n-title'));
          if (v) {
            e.title = v;
            e.setAttribute('aria-label', v);
          }
        });
      }
      applyI18n();
      // 새로고침(재계산): 메인에 재집계 요청(결과는 onAggregate로 갱신).
      const btnRefresh = document.getElementById('btn-refresh');
      if (btnRefresh && window.usage && window.usage.refresh) {
        btnRefresh.onclick = () => window.usage.refresh();
      }
      if (window.usage && window.usage.locale) document.documentElement.lang = window.usage.locale;
      // UI-020: 초기 테마 적용(설정 영속값). CSS 변수는 data-theme로 자동 스왑, 차트는 JS 재테마 필요.
      document.documentElement.dataset.theme = (window.usage && window.usage.theme) || 'light';
      // 임계 색전환 토큰(tokens.css와 동일). 게이지 fill 색을 BurnGauge.burnColor로 결정(≥85 warn·≥95 over).
      const TK = { accent: '#3182F6', warn: '#FFC94D', over: '#F04452' };

      // 재시작/예상소진 시각을 로케일 표시(24h 내면 시각만, 그 이상은 요일+시각). Intl 위임.
      function fmtClock(ms) {
        const d = new Date(ms);
        if (isNaN(d.getTime())) return '';
        const within = ms - Date.now() < 24 * 3600 * 1000;
        const opts = within ? { hour: '2-digit', minute: '2-digit' } : { weekday: 'short', hour: '2-digit', minute: '2-digit' };
        try {
          return new Intl.DateTimeFormat((window.usage && window.usage.locale) || undefined, opts).format(d);
        } catch (e) {
          return d.toLocaleTimeString();
        }
      }
      // 한 윈도우(5h/주간) 게이지 렌더 — 실제 utilization%·재시작·예상소진(없으면 '—').
      function renderUsageCol(prefix, w) {
        const pctEl = document.getElementById(prefix + '-pct');
        const fill = document.getElementById(prefix + '-fill');
        const resetEl = document.getElementById(prefix + '-reset');
        const etaEl = document.getElementById(prefix + '-eta');
        if (!w || typeof w.utilization !== 'number') {
          pctEl.textContent = '—';
          fill.style.width = '0%';
          resetEl.textContent = '';
          if (etaEl) etaEl.textContent = '';
          return;
        }
        const p = window.BurnGauge.clampPct(w.utilization);
        pctEl.textContent = Math.round(p) + '%';
        fill.style.width = p + '%';
        fill.style.background = window.BurnGauge.burnColor(p, TK);
        resetEl.textContent = w.resetsAt ? t('usage_reset', { t: fmtClock(Date.parse(w.resetsAt)) }) : '';
        if (etaEl) etaEl.textContent = w.etaMinutes != null ? t('usage_eta', { t: fmtClock(Date.now() + w.etaMinutes * 60000) }) : '';
      }
      let lastLimits = null;
      function renderLimits(limits) {
        if (!limits) return;
        lastLimits = limits;
        // BL-03: 토큰 만료/없음(authExpired) → 재로그인 안내 노출(캐시 %는 그대로 표시).
        const reauth = document.getElementById('usage-reauth');
        if (reauth) reauth.hidden = !limits.authExpired;
        renderUsageCol('u5h', limits.fiveHour);
        renderUsageCol('u7d', limits.sevenDay);
      }

      // 추세 차트 — 비용/토큰 토글. 샘플 데이터(실제 daily는 DSH-060).
      const sampleDaily = [
        { period: '06-20', totalCost: 12.3, totalTokens: 18000 },
        { period: '06-21', totalCost: 31.5, totalTokens: 42000 },
        { period: '06-22', totalCost: 24.1, totalTokens: 33000 },
        { period: '06-23', totalCost: 48.7, totalTokens: 61000 },
        { period: '06-24', totalCost: 39.2, totalTokens: 50000 },
        { period: '06-25', totalCost: 55.0, totalTokens: 72000 },
        { period: '06-26', totalCost: 91.4, totalTokens: 98000 },
      ];
      // 차트 테마는 현재 data-theme에서 토큰을 골라 생성(토글 시 redrawCharts가 재생성).
      let theme = window.EChartsTheme.makeEchartsTheme(
        window.EChartsTheme.tokensFor(document.documentElement.dataset.theme)
      );
      const chart = echarts.init(document.getElementById('trend-chart'));
      let metric = 'cost';
      function drawTrend() {
        chart.setOption(window.TrendChart.buildTrendOption(sampleDaily, metric, theme), true);
      }
      function setMetric(m) {
        metric = m;
        document.getElementById('t-cost').classList.toggle('active', m === 'cost');
        document.getElementById('t-tok').classList.toggle('active', m === 'tokens');
        drawTrend();
      }
      document.getElementById('t-cost').onclick = () => setMetric('cost');
      document.getElementById('t-tok').onclick = () => setMetric('tokens');
      drawTrend();

      // 오늘 모델 도넛 — 샘플 breakdown(실제 데이터는 DSH-060).
      const sampleModels = [
        { modelName: 'claude-opus-4-8', cost: 88.2 },
        { modelName: 'claude-haiku-4-5-20251001', cost: 3.2 },
      ];
      let currentModels = sampleModels; // 토글 재테마 시 재사용(onAggregate가 실데이터로 갱신).
      const donut = echarts.init(document.getElementById('model-donut'));
      // MODELSHARE: 도넛 우측 하단 범례(색·모델명·비중%). 모델명은 textContent로(임의 문자열 안전).
      function renderLegend(models) {
        const el = document.getElementById('model-legend');
        if (!el) return;
        el.textContent = '';
        for (const it of window.ModelDonut.legendItems(models, theme.color || [])) {
          const row = document.createElement('div');
          row.className = 'legend-item';
          const dot = document.createElement('span');
          dot.className = 'legend-dot';
          dot.style.background = it.color;
          const name = document.createElement('span');
          name.className = 'legend-name';
          name.textContent = it.name;
          const pct = document.createElement('span');
          pct.className = 'legend-pct';
          pct.textContent = it.pct + '%';
          row.append(dot, name, pct);
          el.appendChild(row);
        }
      }
      function drawDonut() {
        donut.setOption(window.ModelDonut.buildDonutOption(currentModels, theme));
        renderLegend(currentModels);
      }
      drawDonut();

      // 프로젝트 카드: ccusage v20은 프로젝트 축 미노출(--instances 부재, OPEN[08]) → 빈상태 표시(AUDIT-010).
      // 가짜 샘플 데이터를 사용자에게 보여주지 않는다(§2). 데이터원 생기면 차트 복원.

      // UI-020: 테마 토글 — data-theme 스왑(CSS 변수 자동) + 차트 JS 재테마 + 설정 영속.
      function redrawCharts() {
        theme = window.EChartsTheme.makeEchartsTheme(
          window.EChartsTheme.tokensFor(document.documentElement.dataset.theme)
        );
        drawTrend();
        drawDonut(); // 재테마 시 도넛 색·범례 색 동기.
      }
      const btnTheme = document.getElementById('btn-theme');
      if (btnTheme) {
        btnTheme.onclick = () => {
          const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
          document.documentElement.dataset.theme = next;
          if (window.usage && window.usage.setTheme) window.usage.setTheme(next);
          redrawCharts();
        };
      }

      // UI-030: UI 배율 +/− — main이 setZoomFactor로 차트+글씨 균일 스케일·영속. clamp는 main과 동일 범위.
      // ponytail: 경계값 main settings.clampScale와 중복 — 한 곳 권위(main)지만 버튼 비활성 UX 위해 미러.
      let uiScale = (window.usage && window.usage.uiScale) || 1;
      const SCALE_MIN = 0.8;
      const SCALE_MAX = 1.5;
      function setScale(s) {
        uiScale = Math.min(SCALE_MAX, Math.max(SCALE_MIN, Math.round(s * 10) / 10));
        if (window.usage && window.usage.setScale) window.usage.setScale(uiScale);
      }
      const btnZoomIn = document.getElementById('btn-zoom-in');
      const btnZoomOut = document.getElementById('btn-zoom-out');
      if (btnZoomIn) btnZoomIn.onclick = () => setScale(uiScale + 0.1);
      if (btnZoomOut) btnZoomOut.onclick = () => setScale(uiScale - 0.1);

      // UI-040: 설정 모달 — 열기(현재값 채움)·저장(main이 검증·영속·즉시반영)·취소.
      (function setupSettings() {
        if (!window.usage || !window.usage.loadSettings) return;
        const overlay = document.getElementById('settings-overlay');
        const $ = (id) => document.getElementById(id);
        const localeSel = $('set-locale');

        // 언어 옵션: '시스템 기본'(빈 값=null) + 지원 로케일(네이티브 이름, Intl.DisplayNames).
        function fillLocaleOptions() {
          const cur = localeSel.value;
          localeSel.innerHTML = '';
          const sys = document.createElement('option');
          sys.value = '';
          sys.textContent = t('set_system');
          localeSel.appendChild(sys);
          for (const lc of window.usage.locales || []) {
            const o = document.createElement('option');
            o.value = lc;
            try {
              o.textContent = new Intl.DisplayNames([lc], { type: 'language' }).of(lc) || lc;
            } catch (e) {
              o.textContent = lc;
            }
            localeSel.appendChild(o);
          }
          localeSel.value = cur;
        }

        async function open() {
          const s = await window.usage.loadSettings();
          fillLocaleOptions();
          localeSel.value = s.locale || '';
          $('set-theme').value = s.theme;
          $('set-timezone').value = s.timezone || '';
          $('set-timezone').placeholder = window.usage.systemTimezone || '';
          $('set-krw').value = s.krwPerUsd;
          $('set-token-limit').value = s.planTokenLimit != null ? s.planTokenLimit : '';
          $('set-reports-dir').value = s.reportsDir || '';
          $('set-scale').value = s.uiScale;
          $('set-autolaunch').checked = !!s.autoLaunch;
          $('set-check-updates').checked = !!s.checkUpdates;
          $('set-accurate').checked = !!s.accurateUsage;
          overlay.hidden = false;
        }
        const close = () => (overlay.hidden = true);

        async function save() {
          const tz = $('set-timezone').value.trim();
          const limit = $('set-token-limit').value;
          const res = await window.usage.saveSettings({
            locale: localeSel.value || null,
            theme: $('set-theme').value,
            timezone: tz || null,
            krwPerUsd: Number($('set-krw').value),
            planTokenLimit: limit === '' ? null : Number(limit),
            reportsDir: $('set-reports-dir').value.trim(),
            uiScale: Number($('set-scale').value),
            autoLaunch: $('set-autolaunch').checked,
            checkUpdates: $('set-check-updates').checked,
            accurateUsage: $('set-accurate').checked,
          });
          applyLive(res && res.settings, res && res.uiLocale);
          close();
        }

        // 즉시 반영(렌더러): 테마·로케일 재번역·숫자 포맷. 배율·재집계·자동실행은 main이 적용.
        function applyLive(s, uiLocale) {
          if (s) {
            document.documentElement.dataset.theme = s.theme;
            redrawCharts();
          }
          if (uiLocale && window.usage.makeT) {
            t = window.usage.makeT(uiLocale);
            applyI18n();
            fillLocaleOptions();
            if (window.Fmt) window.Fmt.setLocale(uiLocale);
            document.documentElement.lang = uiLocale;
            renderUpdateBanner(); // 업데이트 배너 텍스트도 새 로케일로 재번역(표시 중일 때만).
            if (lastLimits) renderLimits(lastLimits); // 5h/주간 재시작·예상소진 라벨도 새 로케일·시각 포맷으로.
            if (lastAgg) renderAgg(lastAgg); // 마지막 집계로 동적 문자열(소진%·ETA) 즉시 새 t 재렌더.
            if (window.usage.refresh) window.usage.refresh(); // 최신 데이터로도 갱신.
          }
        }

        $('btn-settings').onclick = open;
        $('set-close').onclick = close;
        $('set-cancel').onclick = close;
        $('set-save').onclick = save;
        overlay.onclick = (e) => {
          if (e.target === overlay) close(); // 카드 바깥(오버레이) 클릭 시 닫기.
        };
      })();

      // UX-010: 창 크기 변경 시 차트(추세·도넛)를 따라 리사이즈(디바운스). 미동작 시 레이아웃이 안 따라옴.
      window.addEventListener(
        'resize',
        window.ChartResize.makeDebounced(() => window.ChartResize.resizeAll([chart, donut]), 150)
      );

      // 통화·숫자 포맷(DAT-050). 토큰은 K/M/B 축약, 비용은 $ (₩ 병기).
      const fmtCost = (n) => window.Fmt.fmtUsd(n);
      const fmtTok = (n) => window.Fmt.fmtTokens(n);

      // 실데이터 수신 → 게이지·추세·도넛·KPI 갱신(프로젝트는 데이터원 없어 빈상태, OPEN[08]).
      // lastAgg 캐시(UI-040): 로케일 전환 시 동적 문자열(소진%·ETA 등)을 즉시 새 t로 재렌더. 멱등해야 함.
      let lastAgg = null;
      // FEAT-010: 배너 텍스트(동적 버전)는 t() 보간이라 로케일 전환 시 재렌더 필요(게이지/ETA와 동일 패턴).
      let updateVersion = null;
      function renderUpdateBanner() {
        if (!updateVersion) return;
        document.getElementById('update-text').textContent = t('update_available', { version: updateVersion });
        document.getElementById('update-banner').hidden = false;
      }
      // 히어로 게이지+burn rates만 렌더(PERF-010: 8s burn-only 갱신과 전체 집계가 공유). lastAgg.burn 동기화로
      // 로케일 전환 시 최신 burn으로 재렌더. 플랜 토큰 한도 설정 시 토큰 소진율, 없으면 시간 소진율(§4.1, OPEN[09]).
      // 활성 5h 블록 burn rate($/h·tok/h) 캡션만 갱신(소진률 게이지는 실제 한도=renderLimits가 담당).
      function renderBurn(burn) {
        if (!burn) return;
        if (lastAgg) lastAgg.burn = burn; else lastAgg = { burn };
        document.getElementById('burn-cost').textContent = fmtCost(burn.costPerHour);
        document.getElementById('burn-tok').textContent = fmtTok(burn.tokPerHour);
      }
      function renderAgg(agg) {
        if (!agg || !agg.burn) return;
        lastAgg = agg;
        renderBurn(agg.burn);

        if (agg.daily && agg.daily.length) {
          // 비파괴 매핑(원본 period 보존 → 재렌더 시 재슬라이스 안전).
          sampleDaily.length = 0;
          sampleDaily.push(...agg.daily.map((d) => ({ ...d, period: String(d.period).slice(5) }))); // MM-DD
          drawTrend();
        }
        if (agg.today) {
          // 비용: $ 흰색 위 / ₩ 작게 아래(사용자 요청). 환율 없으면 ₩ 생략(오프라인 안전).
          document.getElementById('today-cost-usd').textContent = window.Fmt.fmtUsd(agg.today.totalCost);
          document.getElementById('today-cost-krw').textContent =
            agg.krwPerUsd > 0 ? window.Fmt.fmtKrw(agg.today.totalCost * agg.krwPerUsd) : '';
          document.getElementById('today-tok').textContent = fmtTok(agg.today.totalTokens);
          if (agg.today.models && agg.today.models.length) {
            // (모델 도넛·범례는 상세 탭) — 실데이터로 갱신.
            currentModels = agg.today.models; // 테마 토글 재테마 시 실데이터 유지.
            drawDonut();
          }
        }
        if (agg.last7) {
          // 최근 7일 통계(메인 탭): 총 비용 · 총 토큰.
          document.getElementById('last7-cost').textContent = window.Fmt.fmtUsd(agg.last7.totalCost);
          document.getElementById('last7-tok').textContent = fmtTok(agg.last7.totalTokens);
        }
        if (agg.tokens) renderTokens(agg.tokens);
        if (agg.weekly) renderWeekly(agg.weekly);
      }

      // WEEK5: 메인 최근 5주 주차별(이번 주 포함) — 주 라벨·비례 바·비용·토큰. 최신 주 위로(reverse).
      function renderWeekly(weeks) {
        const el = document.getElementById('week-list');
        if (!el) return;
        el.textContent = '';
        const arr = Array.isArray(weeks) ? weeks.slice().reverse() : [];
        const max = Math.max(1, ...arr.map((w) => Number(w.totalCost) || 0)); // 0 나눗셈 방지.
        for (const w of arr) {
          const cost = Number(w.totalCost) || 0;
          const row = document.createElement('div');
          row.className = 'week-row';
          const label = document.createElement('span');
          label.className = 'week-label';
          label.textContent = String(w.weekStart).slice(5).replace('-', '/'); // MM/DD(주 시작)
          const bar = document.createElement('div');
          bar.className = 'week-bar';
          const fill = document.createElement('div');
          fill.className = 'week-fill';
          fill.style.width = (cost / max) * 100 + '%';
          bar.appendChild(fill);
          const val = document.createElement('span');
          val.className = 'week-val';
          val.textContent = window.Fmt.fmtUsd(cost) + ' · ' + fmtTok(w.totalTokens);
          row.append(label, bar, val);
          el.appendChild(row);
        }
      }

      // BL-05: 상세 탭 토큰 구성(입력·출력·캐시생성·캐시읽기) 바 + 캐시 효율(PDF p3와 동일 식).
      function renderTokens(tk) {
        const v = { input: Number(tk.input) || 0, output: Number(tk.output) || 0, create: Number(tk.cacheCreate) || 0, read: Number(tk.cacheRead) || 0 };
        const max = Math.max(v.input, v.output, v.create, v.read, 1); // 0 나눗셈 방지.
        const set = (id, n) => {
          document.getElementById('tc-' + id).textContent = fmtTok(n);
          document.getElementById('tc-' + id + '-fill').style.width = (n / max) * 100 + '%';
        };
        set('input', v.input); set('output', v.output); set('create', v.create); set('read', v.read);
        // 캐시 효율 = 캐시 읽기 / (입력 + 캐시 생성 + 캐시 읽기). 분모 0 안전.
        const denom = v.input + v.create + v.read;
        document.getElementById('cache-eff').textContent = (denom > 0 ? Math.round((v.read / denom) * 100) : 0) + '%';
      }
      window.usage.onAggregate(renderAgg);
      // PERF-010: 8s 인터벌의 활성 블록 burn-only 갱신(전체 daily 재파싱 없이 게이지·burn rates만).
      if (window.usage.onBurn) window.usage.onBurn(renderBurn);
      // 실제 사용 한도(5h·주간) — Claude 설정창과 동일 소스. main이 5분 주기로 push.
      if (window.usage.onLimits) window.usage.onLimits(renderLimits);

      // 메인/상세 탭 전환. 상세 탭의 도넛은 표시될 때 resize(숨김 중 init은 크기 0이라).
      (function setupTabs() {
        const vMain = document.getElementById('view-main');
        const vDetail = document.getElementById('view-detail');
        const tMain = document.getElementById('tab-main');
        const tDetail = document.getElementById('tab-detail');
        function show(main) {
          vMain.hidden = !main;
          vDetail.hidden = main;
          tMain.classList.toggle('active', main);
          tDetail.classList.toggle('active', !main);
          setTimeout(() => (main ? chart.resize() : donut.resize()), 0); // 표시 후 차트 크기 재계산.
        }
        tMain.onclick = () => show(true);
        tDetail.onclick = () => show(false);
      })();

      // FEAT-010: 업데이트 알림 — main이 새 버전 감지 시 'update:available' push → 배너 표시.
      // "받기"는 main이 보관한 릴리즈 URL을 외부 브라우저로 연다(렌더러는 URL을 모름 = sink 주입 차단).
      if (window.usage && window.usage.onUpdateAvailable) {
        window.usage.onUpdateAvailable((info) => {
          updateVersion = info && info.version ? (/^v/i.test(info.version) ? info.version : 'v' + info.version) : '';
          renderUpdateBanner(); // 로케일 전환 시에도 동일 함수로 재렌더(applyLive에서 호출).
        });
        const getBtn = document.getElementById('update-get');
        if (getBtn) getBtn.onclick = () => window.usage.openRelease();
      }
    </script>
  </body>
</html>
